# Deploy `apps/web-admin` (Vite + React) to GitHub Pages.
#
# Prereqs (repo Settings → Pages):
# - Source: GitHub Actions
# - After first run, the site URL is https://<owner>.github.io/<repo>/
#
# For a user/org site at https://<user>.github.io/ (repo named <user>.github.io),
# set workflow env VITE_BASE_PATH to "/" via repository variable or edit this file.

name: Deploy web-admin to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web-admin/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-web-admin-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web-admin
        env:
          # Project page: app is served under /<repository-name>/ (GH Pages URLs use lowercase)
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          export VITE_BASE_PATH="/$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')/"
          npm run build --workspace web-admin

      - name: SPA fallback (GitHub Pages)
        run: cp apps/web-admin/dist/index.html apps/web-admin/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-admin/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
